name: Release

# Tags the current commit as v<version> and publishes a GitHub Release so the
# module is fetchable via `go get github.com/numberoverzero/slug-ebiten@latest`.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, no leading 'v'). e.g. 0.0.1"
        required: true
        default: "0.0.1"

permissions:
  contents: write # required to push the tag and create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Normalize and validate version
        id: version
        run: |
          # Strip an optional leading 'v' so both "0.0.1" and "v0.0.1" work.
          raw="${{ github.event.inputs.version }}"
          version="${raw#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::'$raw' is not a valid semver (expected X.Y.Z, optional -prerelease/+build)"
            exit 1
          fi
          tag="v${version}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag (will overwrite if it already exists)"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install Ebitengine dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev \
            libxrandr-dev libxxf86vm-dev libasound2-dev pkg-config xvfb

      - name: Verify
        # Run under a virtual X display: Ebiten's UI subsystem panics in package
        # init without one.
        run: xvfb-run -a make build

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          # Delete any existing release and tag (each independently; ignore if
          # absent) so the version can be re-published.
          gh release delete "$tag" --yes 2>/dev/null || true
          gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$tag" 2>/dev/null || true
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --latest \
            --target "$GITHUB_SHA"
